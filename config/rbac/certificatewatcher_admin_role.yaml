# This rule is not used by the project cert-watch-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over monitoring.sonaw.net.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cert-watch-operator
    app.kubernetes.io/managed-by: kustomize
  name: certificatewatcher-admin-role
rules:
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers
  verbs:
  - '*'
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers/status
  verbs:
  - get
