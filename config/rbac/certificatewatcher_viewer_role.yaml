# This rule is not used by the project cert-watch-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to monitoring.sonaw.net resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cert-watch-operator
    app.kubernetes.io/managed-by: kustomize
  name: certificatewatcher-viewer-role
rules:
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers/status
  verbs:
  - get
