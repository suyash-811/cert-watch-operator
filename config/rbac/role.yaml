---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers/finalizers
  verbs:
  - update
- apiGroups:
  - monitoring.sonaw.net
  resources:
  - certificatewatchers/status
  verbs:
  - get
  - patch
  - update
